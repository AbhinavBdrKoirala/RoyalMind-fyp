<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoyalMind - Dashboard</title>
    <link rel="icon" type="image/png" href="src/assets/pieces/main.png?v=2">
    <link rel="apple-touch-icon" href="src/assets/pieces/main.png?v=2">
    <link rel="stylesheet" href="src/styles/main.css">
</head>
<body class="dashboard-page">
    <div class="dashboard-bg" aria-hidden="true">
        <div class="bg-grid"></div>
        <span class="glow-orb orb-a"></span>
        <span class="glow-orb orb-b"></span>
        <span class="glow-orb orb-c"></span>
        <span class="floating-piece piece-1">&#9816;</span>
        <span class="floating-piece piece-2">&#9815;</span>
        <span class="floating-piece piece-3">&#9814;</span>
        <span class="floating-piece piece-4">&#9817;</span>
        <span class="falling-king">&#9818;</span>
    </div>

    <main class="dashboard-shell centered-layout">
        <nav class="dashboard-menu centered-menu" aria-label="Dashboard navigation">
            <button onclick="goTo('game.html?mode=local')">
                <span class="menu-item-icon" aria-hidden="true">&#9822;</span>
                <span>Play Game</span>
            </button>
            <button id="playBotButton" type="button">
                <span class="menu-item-icon" aria-hidden="true">&#9820;</span>
                <span>Play Bot</span>
            </button>
            <button onclick="goTo('settings.html')">
                <span class="menu-item-icon" aria-hidden="true">&#9881;</span>
                <span>Settings</span>
            </button>
            <button onclick="goTo('history.html')">
                <span class="menu-item-icon" aria-hidden="true">&#9783;</span>
                <span>Game History</span>
            </button>
            <button onclick="goTo('subscription.html')">
                <span class="menu-item-icon" aria-hidden="true">&#9733;</span>
                <span>Subscription</span>
            </button>
            <button class="logout-btn" onclick="logout()">
                <span class="menu-item-icon" aria-hidden="true">&#10006;</span>
                <span>Logout</span>
            </button>
        </nav>
    </main>

    <div id="botDialog" class="dashboard-dialog hidden" aria-hidden="true">
        <div class="dashboard-dialog-card" role="dialog" aria-modal="true" aria-labelledby="botDialogTitle">
            <div class="dashboard-dialog-head">
                <div>
                    <p class="dashboard-dialog-kicker">Solo Match</p>
                    <h2 id="botDialogTitle">Choose your bot level</h2>
                </div>
                <button id="closeBotDialog" class="dashboard-dialog-close" type="button" aria-label="Close bot options">&#10005;</button>
            </div>
            <div class="bot-level-grid">
                <button class="bot-level-card" type="button" data-level="easy">
                    <strong>Easy</strong>
                    <span>Relaxed play with simple moves.</span>
                </button>
                <button class="bot-level-card" type="button" data-level="medium">
                    <strong>Medium</strong>
                    <span>Balanced play with better tactical choices.</span>
                </button>
                <button class="bot-level-card" type="button" data-level="hard">
                    <strong>Hard</strong>
                    <span>Stronger calculation and sharper replies.</span>
                </button>
            </div>
        </div>
    </div>

    <script src="src/ui.js"></script>
    <script src="src/dashboard.js"></script>
</body>
</html>
